<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fablab Frontoffice</title>
  <style>
    :root { --text:#0f172a; --tone:#1d4ed8; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
    }
    .panel {
      width: min(720px, 92vw);
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(29, 78, 216, 0.15);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.5; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: var(--tone);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <section class="panel">
    <span class="badge">Placeholder</span>
    <h1>Frontoffice</h1>
    <p>Ce service est en place, mais l'interface n'est pas encore developpee.</p>
  </section>
</body>
</html>
