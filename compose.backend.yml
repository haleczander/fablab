name: fablab-backend

services:
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    container_name: fablab-backend
    env_file:
      - .env.orchestrateur
    environment:
      APP_MODULE: main:app
      APP_PORT: 8000
      BACKEND_DATABASE_URL: ${BACKEND_DATABASE_URL:-sqlite:////data/backend.db}
      ORCHESTRATOR_INTERNAL_URL: ${ORCHESTRATOR_INTERNAL_URL:-http://orchestrateur:8001}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/data
    networks:
      - platform_net
      - edge_net
    restart: unless-stopped

  backoffice:
    build:
      context: apps/back-office
      dockerfile: Dockerfile
    container_name: fablab-backoffice
    depends_on:
      - backend
    environment:
      NUXT_BACKEND_INTERNAL_BASE: http://backend:8000
      NUXT_PUBLIC_BACKEND_BASE: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
    ports:
      - "${BACKOFFICE_PORT:-8080}:3000"
    networks:
      - platform_net
    restart: unless-stopped

  frontoffice:
    build:
      context: apps/front-office
      dockerfile: Dockerfile
    container_name: fablab-frontoffice
    depends_on:
      - backend
    environment:
      NUXT_BACKEND_INTERNAL_BASE: http://backend:8000
      NUXT_PUBLIC_BACKEND_BASE: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
    ports:
      - "${FRONTOFFICE_PORT:-8081}:3000"
    networks:
      - platform_net
    restart: unless-stopped

volumes:
  backend_data:

networks:
  platform_net:
    driver: bridge
  edge_net:
    external: true
    name: fablab_edge_net
