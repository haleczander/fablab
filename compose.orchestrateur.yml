name: fablab-orchestrateur

services:
  reverse-proxy:
    build:
      context: deploy/proxy
      dockerfile: Dockerfile
    container_name: fablab-reverse-proxy
    depends_on:
      - orchestrateur
    environment:
      PROXY_CERT_CN: ${PROXY_CERT_CN:-localhost}
    ports:
      - "${PROXY_HTTPS_PORT}:443"
    volumes:
      - ./deploy/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs
    networks:
      - edge_net
    restart: unless-stopped

  orchestrateur:
    build:
      context: apps/orchestrator
      dockerfile: Dockerfile
    container_name: fablab-orchestrateur
    env_file:
      - .env.orchestrateur
    environment:
      APP_MODULE: main:app
      APP_PORT: 8001
      ORCH_DISCOVERY_CIDRS: 172.21.10.0/24
    expose:
      - "8001"
    volumes:
      - orchestrator_data:/data
    networks:
      - edge_net
      - imp3d_net
    restart: unless-stopped

volumes:
  orchestrator_data:

networks:
  edge_net:
    name: fablab_edge_net
    driver: bridge
  imp3d_net:
    name: fablab_imp3d_net
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/16
