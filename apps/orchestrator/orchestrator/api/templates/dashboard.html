<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchestrateur Dashboard</title>
  <link rel="stylesheet" href="/dashboard.css" />
</head>
<body>
  <main>
    <h1>Dashboard Orchestrateur</h1>

    <section class="card">
      <h3>Jobs en cours</h3>
      <p id="jobsMsg" class="muted"></p>
      <div id="ongoingJobs" class="jobs-grid"></div>
      <p class="muted">Vue 3D temps reel non disponible avec les APIs machine actuelles (etat/telemetrie uniquement).</p>
    </section>

    <section class="card">
      <div class="section-head">
        <h3>Devices disponibles (non bindes)</h3>
        <div class="section-actions">
          <button id="showAllBtn" class="btn-secondary" onclick="toggleShowAllAvailable()">Tout voir</button>
          <button id="scanBtn" class="icon-btn" onclick="refreshNetworkDiscovery()" aria-label="Refresh reseau" title="Refresh reseau">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" />
            </svg>
          </button>
        </div>
      </div>
      <div id="scanProgress" class="scan-progress hidden" aria-hidden="true">
        <div id="scanProgressBar" class="scan-progress-bar"></div>
      </div>
      <p id="scanMsg" class="muted scan-msg"></p>
      <p id="availMsg" class="muted"></p>
      <div class="table-wrap">
        <table id="availableTable">
          <thead>
            <tr>
              <th class="dot-col"></th>
              <th>id metier</th>
              <th>modele</th>
              <th>contrat</th>
              <th>reseau</th>
              <th>action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h3>Devices bindes</h3>
      <p id="boundMsg" class="muted"></p>
      <div class="table-wrap">
        <table id="boundTable">
          <thead>
            <tr>
              <th class="dot-col"></th>
              <th>id metier</th>
              <th>modele</th>
              <th>contrat</th>
              <th>reseau</th>
              <th>action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/dashboard.js" defer></script>
  <datalist id="modelOptions"></datalist>
</body>
</html>
